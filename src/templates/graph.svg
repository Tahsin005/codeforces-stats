<svg xmlns="http://www.w3.org/2000/svg" width="540" height="200" viewBox="0 0 540 200" role="img" aria-label="Rating History for {{ handle }}">
  <title>{{ handle }} | Rating History</title>
  
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="{{ line_color }}" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="{{ line_color }}" stop-opacity="0.08"/>
      <stop offset="95%" stop-color="{{ line_color }}" stop-opacity="0.0"/>
    </linearGradient>

    <clipPath id="chartClip">
      <rect x="-10" y="-10" width="440" height="135"/>
    </clipPath>
  </defs>

  <style>
    <![CDATA[
    /* A more extensive modern sans-serif stack */
    svg { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"; }
    
    /* Subtle themeable background/border colors with modern width */
    .card-bg { fill: #{{ theme.bg_color }}; stroke: #{{ theme.border_color }}; stroke-width: 1.5; stroke-opacity: 0.5; }
    
    /* Clear header hierarchy and premium title styling */
    .graph-header-title { font-size: 16px; font-weight: 700; fill: #{{ theme.title_color }}; letter-spacing: 0.2px; }
    .graph-header-handle { font-size: 20px; font-weight: 600; fill: #{{ theme.icon_color }}; opacity: 0.8; }
    .color-handle { fill: {{ line_color }} !important; opacity: 1; }
    
    /* Subtler axis labels for clarity without clutter */
    .axis-label { font-size: 10px; fill: #{{ theme.icon_color }}; font-weight: 600; opacity: 0.7; }
    
    /* Grid elements updated to subtle dashed lines */
    .chart-gridline { stroke: #{{ theme.border_color }}; stroke-opacity: 0.2; stroke-width: 1; stroke-dasharray: 4 4; }
    .chart-baseline { stroke: #{{ theme.border_color }}; stroke-opacity: 0.5; stroke-width: 1.5; stroke-linecap: round; }
    
    /* Enhanced interaction for points */
    .chart-point { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: crosshair; }
    .chart-point:hover { stroke-width: 3.5px; r: 5.5px; }
    
    /* Smooth entrance animation */
    @keyframes modernFadeIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .modern-animate-in {
      animation: modernFadeIn 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      opacity: 0;
    }
    ]]>
  </style>

  <rect x="8" y="8" width="524" height="184" rx="12" ry="12" class="card-bg" filter="url(#shadow)"/>

  <image href="{{ logo_b64 }}" x="499" y="17" width="20" height="20" opacity="0.90"/>

  <g class="modern-animate-in" style="animation-delay: 0.1s;">
    <text x="32" y="34" class="graph-header-title">Rating History</text>
    
    <rect x="148" y="21" width="1.8" height="16" fill="#{{ theme.border_color }}" opacity="0.5" rx="1.5"/>
    <svg x="154" y="20" width="15" height="15" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1.5 3.5L3.5 6.5L6 2L8.5 6.5L10.5 3.5L9.5 9H2.5L1.5 3.5Z" fill="{{ max_rank_color }}" stroke="{{ max_rank_color }}" stroke-width="1" stroke-linejoin="round"/>
      <rect x="2" y="10" width="8" height="1.5" rx="0.5" fill="{{ max_rank_color }}"/>
    </svg>
    <text x="173" y="33.5" class="graph-header-handle color-handle">{{ handle }}</text>
  </g>

  <g transform="translate(65, 45)">
    <g class="modern-animate-in" style="animation-delay: 0.2s;">
      
      <g clip-path="url(#chartClip)" opacity="0.60">
        {% for band in rating_bands %}
        <rect x="0" y="{{ band.y }}" width="420" height="{{ band.height }}" fill="{{ band.color }}"/>
        {% endfor %}
      </g>

      {% for tick in y_ticks %}
      <line x1="0" y1="{{ tick.y }}" x2="420" y2="{{ tick.y }}" class="chart-gridline"/>
      <text x="-14" y="{{ tick.y }}" text-anchor="end" dominant-baseline="middle" class="axis-label">{{ tick.label }}</text>
      {% endfor %}

      <line x1="0" y1="115" x2="420" y2="115" class="chart-baseline"/>

      <path d="{{ area_path }}" fill="url(#areaGrad)" clip-path="url(#chartClip)"/>

      <path d="{{ line_path }}" fill="none" stroke="{{ line_color }}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#chartClip)"/>

      {% for dot in dots %}
      <circle cx="{{ dot.x }}" cy="{{ dot.y }}" r="{% if dot.isLast %}5{% else %}3{% endif %}" fill="{% if dot.isLast %}{{ dot.color }}{% else %}{{ line_color }}{% endif %}" stroke="#{{ theme.bg_color }}" stroke-width="{% if dot.isLast %}2.5{% else %}1.5{% endif %}" class="chart-point" opacity="{% if dot.isLast %}1{% else %}0.5{% endif %}">
        <title>{{ dot.contest_name }} | Rating: {{ dot.rating }} ({{ dot.date }})</title>
      </circle>
      {% endfor %}

      {% for tick in x_ticks %}
      <text x="{{ tick.x }}" y="136" text-anchor="middle" class="axis-label">{{ tick.label }}</text>
      {% endfor %}
      
    </g>
  </g>
</svg>